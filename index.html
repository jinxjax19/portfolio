<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ella Jackson</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
  }

  body.splash-active {
    overflow: hidden;
  }

  #splash {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2.5rem;
    background: #87CEEB;
    transition: opacity 0.6s ease;
  }

  #splash.splash-hidden {
    opacity: 0;
    pointer-events: none;
  }

  #splash img {
    width: clamp(220px, 50vw, 480px);
    aspect-ratio: 1 / 1;
    object-fit: contain;
  }

  #enter-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.3em;
    font-family: 'Caveat', cursive;
    font-weight: 700;
    font-size: clamp(1.75rem, 4vw, 2.5rem);
    letter-spacing: 0.06em;
    color: #1A2E22;
    background: transparent;
    border: none;
    cursor: pointer;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.5s ease, transform 0.5s ease, color 0.2s ease;
  }

  #enter-btn.show {
    opacity: 1;
    transform: translateY(0);
  }

  #enter-btn::after {
    content: "↓";
    font-size: 0.8em;
    line-height: 1;
    animation: bounce 1.6s ease-in-out infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(6px); }
  }

  #enter-btn:hover {
    color: #1A2E22;
    opacity: 0.7;
  }

  body {
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    background: #1a1a1a url("assetts/home_background.JPG") center center / cover no-repeat fixed;
    position: relative;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: linear-gradient(180deg, rgba(20, 16, 12, 0.45) 0%, rgba(20, 16, 12, 0.15) 30%, rgba(20, 16, 12, 0.35) 100%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 4rem 1.5rem 2rem;
    color: #FAF6EE;
  }

  header h1 {
    font-family: 'Caveat', cursive;
    font-weight: 700;
    font-size: clamp(3.4rem, 11.05vw, 6.8rem);
    line-height: 1;
    color: #FFD23F;
    text-shadow: 0 4px 24px rgba(0, 0, 0, 0.45);
  }

  header p {
    margin-top: 0.25rem;
    font-family: 'Caveat', cursive;
    font-weight: 700;
    font-size: clamp(2.4rem, 8vw, 4.8rem);
    line-height: 1.1;
    letter-spacing: 0.04em;
    color: #FAF6EE;
    text-shadow: 0 4px 24px rgba(0, 0, 0, 0.45);
  }

  .field {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100vh;
    min-height: 700px;
  }

  .sticker {
    position: absolute;
    display: block;
    text-decoration: none;
    width: clamp(160px, 22vw, 280px);
    aspect-ratio: 1 / 1;
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.35s ease;
    animation: float 7s ease-in-out infinite;
    filter: drop-shadow(0 12px 28px rgba(0, 0, 0, 0.4));
  }

  .sticker img.content {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .sticker:hover {
    transform: scale(1.12) rotate(0deg) !important;
    filter: drop-shadow(0 20px 36px rgba(0, 0, 0, 0.5));
  }

  .sticker:active {
    transform: scale(1.04) rotate(0deg) !important;
  }

  #about-link {
    top: 3%;
    left: 30%;
    width: clamp(265px, 36.4vw, 464px);
    transform: translateX(-50%) rotate(-7deg);
    animation-delay: 0s;
  }

  #about-link:hover {
    transform: translateX(-50%) scale(1.04) rotate(-7deg) !important;
  }

  #portfolio-link {
    top: 30%;
    right: 16%;
    left: auto;
    transform: rotate(5deg);
    animation-delay: 1.4s;
  }

  #linkedin-link {
    bottom: 12%;
    left: 26%;
    transform: rotate(-4deg);
    animation-delay: 2.8s;
  }

  .sticker:hover#about-link,
  .sticker:hover#portfolio-link,
  .sticker:hover#linkedin-link {
    transform: scale(1.12) rotate(0deg) !important;
  }

  @keyframes float {
    0%, 100% { translate: 0 0; }
    50% { translate: 0 -16px; }
  }

  @media (hover: hover) {
    .sticker:hover { animation-play-state: paused; }
  }

  @media (max-width: 720px) {
    .field {
      height: auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
      padding: 2rem 1.5rem 5rem;
    }

    .sticker {
      position: static;
      width: clamp(180px, 60vw, 260px);
      transform: none !important;
      animation: float 7s ease-in-out infinite;
    }

    #about-link, #portfolio-link, #linkedin-link {
      transform: none;
    }

    #about-link {
      width: clamp(210px, 70vw, 300px);
    }
  }
</style>
</head>
<body class="splash-active">

  <div id="splash">
    <img src="assetts/Ella_animate.GIF" alt="Animated drawing of Ella">
    <button id="enter-btn">Enter</button>
  </div>

  <header>
    <h1>Welcome!</h1>
    <p>Come on in. Click around awhile.</p>
  </header>

  <div class="field">
    <a id="about-link" class="sticker" href="about.html" aria-label="About Me">
      <img class="content" src="assetts/about_me.PNG" alt="About Me">
    </a>

    <a id="portfolio-link" class="sticker" href="portfolio.html" aria-label="Portfolio">
      <img class="content" src="assetts/flower.PNG" alt="Portfolio">
    </a>

    <a id="linkedin-link" class="sticker" href="https://www.linkedin.com/in/eleanor-jackson-547466117/" target="_blank" rel="noopener" aria-label="LinkedIn">
      <img class="content" src="assetts/target.PNG" alt="LinkedIn">
    </a>
  </div>

  <script>
    var splash = document.getElementById('splash');
    var enterBtn = document.getElementById('enter-btn');

    setTimeout(function () {
      enterBtn.classList.add('show');
    }, 4250);

    enterBtn.addEventListener('click', function () {
      splash.classList.add('splash-hidden');
      document.body.classList.remove('splash-active');
      splash.addEventListener('transitionend', function () {
        splash.remove();
      }, { once: true });
    });
  </script>

</body>
</html>
